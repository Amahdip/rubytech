<!-- @dsCard group="Colors" viewport="700x180" name="Brand Colors" subtitle="Primary, secondary, and tertiary brand palette" -->
<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <link rel="stylesheet" href="../styles.css" />
  <style>
    body { background: #fff; padding: 20px; margin: 0; font-family: system-ui, sans-serif; }
    .swatches { display: flex; gap: 12px; flex-wrap: wrap; }
    .swatch { display: flex; flex-direction: column; gap: 6px; min-width: 90px; }
    .swatch-box { width: 90px; height: 56px; border-radius: 8px; }
    .swatch-name { font-size: 11px; font-weight: 600; color: #292A33; }
    .swatch-hex  { font-size: 10px; color: #6F7285; font-family: monospace; }
  </style>
</head>
<body>
<div class="swatches">
  <div class="swatch">
    <div class="swatch-box" style="background:#DF0F50;"></div>
    <div class="swatch-name">Brand</div>
    <div class="swatch-hex">#DF0F50</div>
  </div>
  <div class="swatch">
    <div class="swatch-box" style="background:#FA3879;"></div>
    <div class="swatch-name">Brand Dark</div>
    <div class="swatch-hex">#FA3879</div>
  </div>
  <div class="swatch">
    <div class="swatch-box" style="background:rgba(250,56,121,0.12); border:1px solid #E6E7EF;"></div>
    <div class="swatch-name">Brand BG</div>
    <div class="swatch-hex">FA3879 / 12%</div>
  </div>
  <div class="swatch">
    <div class="swatch-box" style="background:#05A3E8;"></div>
    <div class="swatch-name">Secondary</div>
    <div class="swatch-hex">#05A3E8</div>
  </div>
  <div class="swatch">
    <div class="swatch-box" style="background:#00B96C;"></div>
    <div class="swatch-name">Tertiary</div>
    <div class="swatch-hex">#00B96C</div>
  </div>
</div>
</body>
</html>
