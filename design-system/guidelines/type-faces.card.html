<!-- @dsCard group="Type" viewport="700x140" name="Typefaces" subtitle="Vazirmatn (Persian), Open Sans (Latin), Roboto, Sanchez" -->
<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <link rel="stylesheet" href="../styles.css" />
  <style>
    body { background: #fff; padding: 20px; margin: 0; }
    .row { display: flex; align-items: center; gap: 20px; padding: 5px 0; border-bottom: 1px solid #F5F5F9; }
    .family { font-size: 10px; color: #9DA1B1; font-family: monospace; min-width: 110px; }
    .sample { font-size: 18px; color: #292A33; }
    .note { font-size: 10px; color: #6F7285; margin-right: auto; }
  </style>
</head>
<body>
  <div class="row">
    <div class="family">Vazirmatn</div>
    <div class="sample" style="font-family:'Vazirmatn',sans-serif;">آپارات · دنبال کردن · عنوان ویدیو</div>
    <div class="note">Persian primary · replaces IRANSans(FaNum)</div>
  </div>
  <div class="row">
    <div class="family">Open Sans</div>
    <div class="sample" style="font-family:'Open Sans',sans-serif;direction:ltr;">Aparat · Channel · Views</div>
    <div class="note">Latin primary</div>
  </div>
  <div class="row">
    <div class="family">Roboto</div>
    <div class="sample" style="font-family:'Roboto',sans-serif;direction:ltr;">14:45 · 1,400 views · Dashboard</div>
    <div class="note">Numerics, Latin secondary</div>
  </div>
  <div class="row">
    <div class="family">Sanchez</div>
    <div class="sample" style="font-family:'Sanchez',serif;direction:ltr;">Code snippet · Tag</div>
    <div class="note">Code / display accent</div>
  </div>
</body>
</html>
