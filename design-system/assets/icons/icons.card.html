<!-- @dsCard group="Brand" viewport="700x300" name="Icons" subtitle="22 icons — stroke-based, 20px, recolor via CSS color" -->
<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <link rel="stylesheet" href="../../styles.css" />
  <style>
    body { background: #fff; padding: 20px; margin: 0; }
    .grid { display: flex; flex-wrap: wrap; gap: 12px; }
    .item { display: flex; flex-direction: column; align-items: center; gap: 5px; width: 68px; }
    .box { width: 44px; height: 44px; background: #F5F5F9; border-radius: 8px; display: flex; align-items: center; justify-content: center; color: #292A33; }
    .name { font-size: 9px; color: #6F7285; text-align: center; font-family: monospace; word-break: break-all; }
  </style>
</head>
<body>
<div id="root"></div>
<script>
// Inline simplified icon set for the card preview
const icons = {
  AddIcon:        { d: 'M12 5v14M5 12h14' },
  ArrowDownIcon:  { d: 'M6 9l6 6 6-6' },
  HelpIcon:       { d: 'M12 22a10 10 0 100-20 10 10 0 000 20zm0-6v-2m0-4a2 2 0 10-2-2' },
  LikeIcon:       { d: 'M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z' },
  HomeBlack:      { d: 'M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z' },
  Play:           { d: 'M5 3l14 9-14 9V3z', fill: true },
  VideoCamera:    { d: 'M15 10l4.553-2.069A1 1 0 0121 8.82v6.36a1 1 0 01-1.447.894L15 14M3 8a2 2 0 012-2h10a2 2 0 012 2v8a2 2 0 01-2 2H5a2 2 0 01-2-2V8z' },
  RadioButton:    { d: 'M12 22a10 10 0 100-20 10 10 0 000 20zm0-6a4 4 0 100-8 4 4 0 000 8z' },
  GearSix:        { d: 'M12 15a3 3 0 100-6 3 3 0 000 6zm0-12v2m0 16v2M4.93 4.93l1.41 1.41m11.32 11.32l1.41 1.41M2 12h2m16 0h2M4.93 19.07l1.41-1.41m11.32-11.32l1.41-1.41' },
  Notification:   { d: 'M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9m-6 13a2 2 0 01-4 0' },
  Chat:           { d: 'M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z' },
  ChartLineUp:    { d: 'M4 20l4-8 4 4 4-8 4-4' },
  AppWindow:      { d: 'M4 6h16a2 2 0 012 2v10a2 2 0 01-2 2H4a2 2 0 01-2-2V8a2 2 0 012-2zm0 4h16' },
  Layout:         { d: 'M3 3h18v18H3zM9 3v18M3 9h6' },
  Columns:        { d: 'M3 3h8v18H3zM13 3h8v18h-8z' },
  Textbox:        { d: 'M4 7a2 2 0 012-2h12a2 2 0 012 2v10a2 2 0 01-2 2H6a2 2 0 01-2-2V7zm8-2v2m0 10v2' },
  TextHOne:       { d: 'M4 6h8M8 6v12M4 12h8M16 6v12M16 9l4-3' },
  PaintBrushBroad:{ d: 'M3 17v4h18v-4M3 3h18v10H3zM3 13h18' },
  Confetti:       { d: 'M4 24L12 4l12 12zm6-4l8-8' },
  Tag:            { d: 'M4 4l8 0 12 12-8 8L4 12zm5 5h.01' },
  Sidebar:        { d: 'M4 4h16a2 2 0 012 2v12a2 2 0 01-2 2H4a2 2 0 01-2-2V6a2 2 0 012-2zm6 0v16' },
  Color:          { d: 'M12 2a10 10 0 100 20 10 10 0 000-20zm-3 10a3 3 0 100-6 3 3 0 000 6zm6 0a3 3 0 100-6 3 3 0 000 6zm-3 6a3 3 0 100-6 3 3 0 000 6z' },
};

const root = document.getElementById('root');
const grid = document.createElement('div');
grid.className = 'grid';

Object.entries(icons).forEach(([name, { d, fill }]) => {
  const item = document.createElement('div');
  item.className = 'item';
  item.innerHTML = `
    <div class="box">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="${fill ? 'currentColor' : 'none'}"
        stroke="${fill ? 'none' : 'currentColor'}" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="${d}"/>
      </svg>
    </div>
    <div class="name">${name}</div>
  `;
  grid.appendChild(item);
});

root.appendChild(grid);
</script>
</body>
</html>
