  Color:          { viewBox:"0 0 32 32", body:'<circle cx="16" cy="16" r="10" fill="none" stroke="currentColor" stroke-width="2"/><circle cx="12" cy="13" r="2" fill="currentColor"/><circle cx="20" cy="13" r="2" fill="currentColor"/><circle cx="16" cy="20" r="2" fill="currentColor"/>' },
};

function Ic({ name, data }) {
  return (
    <div className="item">
      <div className="box">
        <svg width="22" height="22" viewBox={data.viewBox}
          dangerouslySetInnerHTML={{ __html: data.body }} />
      </div>
      <div className="name">{name}</div>
    </div>
  );
}

function App() {
  return (
    <div className="grid">
      {Object.entries(iconData).map(([name, data]) => (
        <Ic key={name} name={name} data={data} />
      ))}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
