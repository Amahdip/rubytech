<!-- @dsCard group="Colors" viewport="700x190" name="Neutral Scale" subtitle="Gray-10 through Gray-70 plus dark tones" -->
<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <link rel="stylesheet" href="../styles.css" />
  <style>
    body { background: #fff; padding: 20px; margin: 0; font-family: system-ui, sans-serif; }
    .swatches { display: flex; gap: 10px; flex-wrap: wrap; }
    .swatch { display: flex; flex-direction: column; gap: 5px; }
    .swatch-box { width: 72px; height: 48px; border-radius: 6px; border: 1px solid rgba(0,0,0,0.06); }
    .swatch-name { font-size: 10px; font-weight: 600; color: #292A33; }
    .swatch-hex  { font-size: 9px; color: #6F7285; font-family: monospace; }
  </style>
</head>
<body>
<div class="swatches">
  <div class="swatch"><div class="swatch-box" style="background:#FFFFFF;"></div><div class="swatch-name">White</div><div class="swatch-hex">#FFFFFF</div></div>
  <div class="swatch"><div class="swatch-box" style="background:#FBFBFC;"></div><div class="swatch-name">Gray 10</div><div class="swatch-hex">#FBFBFC</div></div>
  <div class="swatch"><div class="swatch-box" style="background:#F5F5F9;"></div><div class="swatch-name">Gray 20</div><div class="swatch-hex">#F5F5F9</div></div>
  <div class="swatch"><div class="swatch-box" style="background:#E6E7EF;"></div><div class="swatch-name">Gray 30</div><div class="swatch-hex">#E6E7EF</div></div>
  <div class="swatch"><div class="swatch-box" style="background:#D3D6E0;"></div><div class="swatch-name">Gray 40</div><div class="swatch-hex">#D3D6E0</div></div>
  <div class="swatch"><div class="swatch-box" style="background:#6F7285;"></div><div class="swatch-name">Gray 50</div><div class="swatch-hex">#6F7285</div></div>
  <div class="swatch"><div class="swatch-box" style="background:#484B62;"></div><div class="swatch-name">Gray 60</div><div class="swatch-hex">#484B62</div></div>
  <div class="swatch"><div class="swatch-box" style="background:#292A33;"></div><div class="swatch-name">Gray 70</div><div class="swatch-hex">#292A33</div></div>
  <div class="swatch"><div class="swatch-box" style="background:#9DA1B1;"></div><div class="swatch-name">Dark 01</div><div class="swatch-hex">#9DA1B1</div></div>
  <div class="swatch"><div class="swatch-box" style="background:#212226;"></div><div class="swatch-name">Dark 02</div><div class="swatch-hex">#212226</div></div>
</div>
</body>
</html>
