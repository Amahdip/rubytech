<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<!-- @template name="Aparat Video Feed" description="RTL video platform home feed — sidebar nav, topbar with search, category chips, video card grid. Reference implementation of the design system." -->
<helmet>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; }
    body { font-family: 'IRANSansXV','IRANSans(FaNum)',system-ui,sans-serif; background:#FBFBFC; color:#292A33; direction:rtl; }
    ::-webkit-scrollbar { width:4px; } ::-webkit-scrollbar-thumb { background:#D3D6E0; border-radius:4px; }
  </style>
  <script type="text/babel">
function Icon({ d, size=20, color='currentColor', fill='none' }) {
  return <svg width={size} height={size} viewBox="0 0 24 24" fill={fill} stroke={color} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><path d={d}/></svg>;
}
const IC = {
  home:'M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z',
  compass:'M12 2a10 10 0 100 20 10 10 0 000-20zm4.24 6.24l-2.83 7.07-7.07 2.83 2.83-7.07 7.07-2.83z',
  live:'M6.3 5.5a8 8 0 0111.4 0M3.5 2.7a12 12 0 0117 0M12 17a2 2 0 100-4 2 2 0 000 4z',
  playlist:'M3 6h18M3 12h12M3 18h8',
  bookmark:'M19 21l-7-5-7 5V5a2 2 0 012-2h10a2 2 0 012 2z',
  history:'M3 12a9 9 0 109-9H3m0 0l3-3M3 3l3 3m3 3v5l4 2',
  settings:'M12 15a3 3 0 100-6 3 3 0 000 6zm0-12v2m0 16v2m-7.07-14.07l1.41 1.41m11.32 11.32l1.41 1.41M2 12h2m16 0h2M4.93 19.07l1.41-1.41m11.32-11.32l1.41-1.41',
  bell:'M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9m-6 13a2 2 0 01-4 0',
  search:'M21 21l-4.35-4.35M17 11A6 6 0 115 11a6 6 0 0112 0z',
  upload:'M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4m14-7l-5-5-5 5m5-5v12',
  user:'M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2m8-10a4 4 0 100-8 4 4 0 000 8z',
  play:'M8 5v14l11-7z',
};
const navItems = [
  {id:'home',    icon:'home',     label:'صفحه نخست'},
  {id:'explore', icon:'compass',  label:'کشف کنید'},
  {id:'live',    icon:'live',     label:'پخش زنده'},
  {id:'playlist',icon:'playlist', label:'ویدیوهای من'},
  {id:'saved',   icon:'bookmark', label:'بعدا می‌بینم'},
  {id:'history', icon:'history',  label:'تاریخچه'},
];
const categories = ['همه','موسیقی','آموزش','سرگرمی','ورزش','خبر','بازی','مستند','طنز','علم'];
const videos = [
  {duration:'14:45',title:'آموزش طراحی رابط کاربری با فیگما — از صفر تا صد',channel:'کانال آموزشی',views:'۱۴ هزار بازدید',ago:'۸ هفته پیش'},
  {duration:'5:21', title:'معرفی ویژگی‌های جدید — نسخه ۲۰۲۵',              channel:'کانال رسمی',   views:'۹۲ هزار بازدید',ago:'۳ روز پیش'},
  {duration:'22:10',title:'نقد و بررسی گوشی جدید گلکسی اس ۲۵',             channel:'تک‌نیوز',      views:'۳.۲ هزار بازدید',ago:'۱ روز پیش'},
  {isLive:true,     title:'پخش زنده: مسابقه فینال لیگ برتر',                channel:'ورزش ۳',       views:'۵.۸ هزار بازدید',ago:'همین الان'},
  {duration:'8:03', title:'طرز تهیه کیک شکلاتی خانگی خوشمزه',              channel:'آشپزخانه من',  views:'۶۷۰ بازدید',    ago:'۲ هفته پیش'},
  {duration:'31:44',title:'مستند: طبیعت ایران — جنگل‌های شمال',             channel:'مستندهای برتر',views:'۲۵ هزار بازدید',ago:'۱ ماه پیش'},
  {duration:'3:55', title:'کلیپ طنز: وقتی برنامه‌نویس با دیزاینر بحث می‌کنه',channel:'طنزستان',   views:'۱۱۰ هزار بازدید',ago:'۵ روز پیش'},
  {duration:'47:00',title:'پادکست: آینده هوش مصنوعی در ایران',              channel:'آینده‌نگر',   views:'۴.۱ هزار بازدید',ago:'۳ هفته پیش'},
];

function Tag({children,active,onClick}) {
  return <span onClick={onClick} style={{display:'inline-flex',alignItems:'center',padding:'4px 12px',borderRadius:100,fontSize:12,fontFamily:'inherit',background:active?'rgba(223,15,80,0.1)':'#F5F5F9',color:active?'#DF0F50':'#484B62',border:active?'1px solid #DF0F50':'1px solid #E6E7EF',cursor:'pointer',whiteSpace:'nowrap',userSelect:'none',transition:'all 0.12s'}}>{children}</span>;
}

function VideoCard({title,channel,views,ago,duration,isLive}) {
  const [hov,setHov]=React.useState(false);
  return (
    <div onMouseEnter={()=>setHov(true)} onMouseLeave={()=>setHov(false)} style={{display:'flex',flexDirection:'column',gap:8,cursor:'pointer',direction:'rtl'}}>
      <div style={{position:'relative',borderRadius:8,overflow:'hidden',aspectRatio:'16/9',background:'#E6E7EF',flexShrink:0}}>
        <div style={{width:'100%',height:'100%',background:hov?'#D3D6E0':'#E6E7EF',display:'flex',alignItems:'center',justifyContent:'center',transition:'background 0.2s'}}>
          <Icon d={IC.play} size={28} color="#9DA1B1" fill="#9DA1B1"/>
        </div>
        <div style={{position:'absolute',bottom:6,left:6,background:isLive?'#DF0F50':'rgba(0,0,0,0.75)',color:'#fff',fontSize:10,fontWeight:700,fontFamily:'Roboto,sans-serif',padding:'2px 5px',borderRadius:3}}>{isLive?'LIVE':duration}</div>
      </div>
      <div style={{display:'flex',flexDirection:'column',gap:2}}>
        <div style={{fontSize:13,fontFamily:'inherit',fontWeight:400,color:hov?'#DF0F50':'#292A33',lineHeight:'20px',display:'-webkit-box',WebkitLineClamp:2,WebkitBoxOrient:'vertical',overflow:'hidden',transition:'color 0.15s'}}>{title}</div>
        <div style={{fontSize:11,color:'#6F7285',fontFamily:'inherit',lineHeight:'16px'}}>
          <div>{channel}</div><div>{views} · {ago}</div>
        </div>
      </div>
    </div>
  );
}

function Sidebar({active,setActive}) {
  return (
    <aside style={{width:220,flexShrink:0,height:'100%',background:'#fff',borderLeft:'1px solid #E6E7EF',display:'flex',flexDirection:'column'}}>
      <div style={{padding:'16px 20px 20px',display:'flex',alignItems:'center',gap:10,borderBottom:'1px solid #F5F5F9'}}>
        <div style={{width:32,height:32,borderRadius:8,background:'#DF0F50',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
          <Icon d={IC.play} size={16} color="white" fill="white"/>
        </div>
        <span style={{fontSize:18,fontWeight:700,color:'#DF0F50',fontFamily:'inherit',letterSpacing:-0.5}}>آپارات</span>
      </div>
      <nav style={{display:'flex',flexDirection:'column',gap:2,padding:'12px 8px',flex:1,overflowY:'auto'}}>
        {navItems.map((item,i)=>(
          <div key={i} onClick={()=>setActive(i)} style={{display:'flex',alignItems:'center',gap:10,padding:'9px 12px',borderRadius:8,cursor:'pointer',direction:'rtl',background:active===i?'#F5F5F9':'transparent',color:active===i?'#DF0F50':'#484B62',transition:'background 0.1s'}}>
            <Icon d={IC[item.icon]} size={18} color={active===i?'#DF0F50':'#6F7285'}/>
            <span style={{fontSize:13,fontWeight:active===i?600:400,fontFamily:'inherit'}}>{item.label}</span>
          </div>
        ))}
      </nav>
      <div style={{padding:'0 8px 16px'}}>
        <div style={{display:'flex',alignItems:'center',gap:10,padding:'9px 12px',cursor:'pointer',color:'#6F7285',direction:'rtl'}}>
          <Icon d={IC.settings} size={18} color="#6F7285"/><span style={{fontSize:13,fontFamily:'inherit'}}>تنظیمات</span>
        </div>
      </div>
    </aside>
  );
}

function Topbar() {
  return (
    <header style={{height:60,background:'#fff',borderBottom:'1px solid #E6E7EF',display:'flex',alignItems:'center',padding:'0 20px',gap:12,flexShrink:0,direction:'rtl'}}>
      <div style={{flex:1,maxWidth:400,display:'flex',alignItems:'center',height:36,background:'#F5F5F9',borderRadius:100,padding:'0 14px',gap:8,direction:'rtl'}}>
        <Icon d={IC.search} size={15} color="#6F7285"/>
        <input placeholder="جستجو در آپارات..." style={{border:'none',background:'transparent',outline:'none',fontSize:13,fontFamily:'inherit',color:'#292A33',width:'100%',direction:'rtl'}}/>
      </div>
      <div style={{flex:1}}/>
      <div style={{display:'flex',alignItems:'center',gap:8}}>
        <button style={{width:36,height:36,borderRadius:'50%',border:'none',background:'transparent',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',color:'#6F7285'}}>
          <Icon d={IC.bell} size={20} color="#6F7285"/>
        </button>
        <button style={{display:'inline-flex',alignItems:'center',gap:5,height:34,padding:'0 14px',borderRadius:4,border:'none',background:'#DF0F50',color:'#fff',fontSize:13,fontWeight:500,fontFamily:'inherit',cursor:'pointer'}}>
          <Icon d={IC.upload} size={14} color="white"/><span>آپلود</span>
        </button>
        <div style={{width:32,height:32,borderRadius:'50%',background:'#DF0F50',display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer'}}>
          <Icon d={IC.user} size={16} color="white"/>
        </div>
      </div>
    </header>
  );
}

function App() {
  const [activeNav,setActiveNav]=React.useState(0);
  const [activeCat,setActiveCat]=React.useState(0);
  return (
    <div style={{display:'flex',height:'100vh',overflow:'hidden'}}>
      <Sidebar active={activeNav} setActive={setActiveNav}/>
      <div style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden'}}>
        <Topbar/>
        <div style={{background:'#fff',borderBottom:'1px solid #E6E7EF',padding:'10px 20px',display:'flex',gap:8,overflowX:'auto',flexShrink:0,direction:'rtl'}}>
          {categories.map((cat,i)=><Tag key={i} active={activeCat===i} onClick={()=>setActiveCat(i)}>{cat}</Tag>)}
        </div>
        <div style={{flex:1,overflowY:'auto',padding:20}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16,direction:'rtl'}}>
            <span style={{fontSize:14,fontWeight:600,color:'#292A33',fontFamily:'inherit'}}>پیشنهادی برای شما</span>
            <button style={{height:32,padding:'0 12px',borderRadius:4,border:'1.5px solid #DF0F50',background:'transparent',color:'#DF0F50',fontSize:12,fontWeight:500,fontFamily:'inherit',cursor:'pointer'}}>نمایش همه</button>
          </div>
          <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(210px,1fr))',gap:20,direction:'rtl'}}>
            {videos.map((v,i)=><VideoCard key={i} {...v}/>)}
          </div>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('__aparat_root')).render(<App/>);
  </script>
</helmet>
<div id="__aparat_root" style="height: 100vh; overflow: hidden;"></div>
</x-dc>
</body>
</html>
